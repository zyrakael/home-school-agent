services:
  mysql:
    image: mysql:8.4
    container_name: home_school_agent_mysql
    environment:
      MYSQL_ROOT_PASSWORD: agent
      MYSQL_DATABASE: agent
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"

volumes:
  mysql_data:
